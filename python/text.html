<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간단한 메모장</title>
    <style>
        /* CSS 스타일링 */
        body {
            font-family: 'NanumGothic', 'Noto Sans CJK KR', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 15px;
        }
        .container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            flex-grow: 1;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: none;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        textarea:focus {
            border-color: #007bff;
        }
        .button-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
        }
        .btn-load {
            background-color: #6c757d;
            color: white;
        }
        .btn-load:hover {
            background-color: #5a6268;
        }
        .btn-save {
            background-color: #007bff;
            color: white;
        }
        .btn-save:hover {
            background-color: #0069d9;
        }
        #status-msg {
            margin-top: 10px;
            font-size: 14px;
            color: #28a745;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📝 나의 메모장</h2>
        <textarea id="memo-area" placeholder="여기에 내용을 입력하세요..."></textarea>
        
        <div class="button-group">
            <button class="btn-load" onclick="loadMemo()">불러오기</button>
            <button class="btn-save" onclick="saveMemo()">저장하기</button>
        </div>
        
        <div id="status-msg"></div>
    </div>

    <script>
        // 페이지가 켜지자마자 기존 메모를 자동으로 불러옵니다.
        window.addEventListener('pywebviewready', function() {
            loadMemo();
        });

        // 1. 메모 저장 기능 (Python의 save_note 호출)
        function saveMemo() {
            const textData = document.getElementById('memo-area').value;
            const statusDiv = document.getElementById('status-msg');

            // pywebview 인터페이스를 통해 파이썬의 save_note() 함수를 호출합니다.
            window.pywebview.api.save_note(textData).then(function(response) {
                if (response.status === "saved") {
                    statusDiv.style.color = "#28a745";
                    statusDiv.innerText = "💾 성공적으로 저장되었습니다!";
                    
                    // 2초 뒤 안내 메시지 삭제
                    setTimeout(() => { statusDiv.innerText = ""; }, 2000);
                }
            }).catch(function(error) {
                statusDiv.style.color = "#dc3545";
                statusDiv.innerText = "❌ 저장 중 오류 발생: " + error;
            });
        }

        // 2. 메모 불러오기 기능 (Python의 load_note 호출)
        function loadMemo() {
            const memoArea = document.getElementById('memo-area');
            const statusDiv = document.getElementById('status-msg');

            // pywebview 인터페이스를 통해 파이썬의 load_note() 함수를 호출합니다.
            window.pywebview.api.load_note().then(function(response) {
                memoArea.value = response.text;
            }).catch(function(error) {
                // 처음에 파일이 없으면 에러가 날 수 있으므로 예외 처리
                console.log("불러올 기존 파일이 없습니다.");
            });
        }
    </script>
</body>
</html>
