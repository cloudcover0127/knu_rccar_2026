<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocar Professional Controller</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>🏎️ AUTOCAR COMMAND</h2>
        <div class="status-bar">
            <div class="status-dot"></div>
            <span>정석 구조 분리 완료</span>
        </div>
        
        <div class="controller">
            <div class="blank"></div>
            <button onclick="sendCommand('forward')">▲</button>
            <div class="blank"></div>
            
            <button onclick="sendCommand('left')">◀</button>
            <button onclick="sendCommand('stop')" class="stop-btn">■</button>
            <button onclick="sendCommand('right')">▶</button>
            
            <div class="blank"></div>
            <button onclick="sendCommand('backward')">▼</button>
            <div class="blank"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
