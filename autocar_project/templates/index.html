<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocar Power Start Cockpit v1.2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="navbar">
        <div class="nav-logo">⚡ KNU_AUTOCAR INTERFACE</div>
        <div class="nav-status" id="sysStatus">🔴 SYSTEM OFF</div>
    </header>

    <main class="cockpit-screen">
        <div class="hud-container">
            <div class="speed-display">
                <button class="power-btn" id="powerBtn" onclick="togglePower()">
                    ENGINE<br><span class="power-sub">START/STOP</span>
                </button>
                
                <div class="speed-value" id="speedNum">0</div>
                <div class="speed-unit">km/h</div>
                <div class="drive-gear" id="gearText">READY</div>

                <div class="steering-zone">
                    <div class="steering-background">
                        <div class="steering-center-line"></div> </div>
                    <div class="steering-wheel" id="steeringWheel">
                        <div class="wheel-spoke horizontal"></div>
                        <div class="wheel-spoke vertical"></div>
                        <div class="wheel-center"></div>
                    </div>
                </div>
            </div>

            <div class="pad-zone">
                <button class="control-btn btn-up" onmousedown="pedalControl('forward', true)" onmouseup="pedalControl('forward', false)" onmouseleave="pedalControl('forward', false)">▲<span class="btn-sub">DRIVE</span></button>
                <button class="control-btn btn-left" onclick="resetSteer()">◀<span class="btn-sub">RESET</span></button>
                <button class="control-btn btn-stop" onclick="emergencyStop()">■<span class="btn-sub">BREAK</span></button>
                <button class="control-btn btn-right" onclick="resetSteer()">▶<span class="btn-sub">RESET</span></button>
                <button class="control-btn btn-down" onmousedown="pedalControl('backward', true)" onmouseup="pedalControl('backward', false)" onmouseleave="pedalControl('backward', false)">▼<span class="btn-sub">REVERSE</span></button>
            </div>
        </div>

        <footer class="system-footer">
            <span class="log-label">[SYSTEM]</span>
            <span id="consoleLog">> ENGINE START REQUIRED.</span>
        </footer>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
