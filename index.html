<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장운호 | 자율주행 포트폴리오</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: #030712; 
            color: #f3f4f6; 
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .bg-glow-1 { position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vh; background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%); pointer-events: none; }
        .bg-glow-2 { position: fixed; bottom: -10%; right: -10%; width: 50vw; height: 50vh; background: radial-gradient(circle, rgba(129,140,248,0.08) 0%, transparent 70%); pointer-events: none; }

        main { max-width: 680px; margin: 0 auto; padding: 6rem 1.5rem; position: relative; z-index: 10; }

        /* 프로필 카드 */
        .profile-card { 
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 3rem 2.5rem; 
            border-radius: 20px; 
            margin-bottom: 4rem;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .profile-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 20px 40px -15px rgba(56, 189, 248, 0.15);
        }

        .university { 
            font-size: 0.75rem; 
            color: #38bdf8; 
            font-weight: 800; 
            letter-spacing: 2px; 
            margin-bottom: 0.8rem; 
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }
        .profile-card h1 { font-size: 2.6rem; font-weight: 800; color: #fff; margin-bottom: 0.6rem; letter-spacing: -1px; }
        
        /* 💡 새롭게 추가된 트렌디한 뱃지 스타일 */
        .badge-container { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
        .info-badge { 
            background: rgba(56, 189, 248, 0.1); 
            color: #38bdf8; 
            border: 1px solid rgba(56, 189, 248, 0.2); 
            padding: 0.25rem 0.65rem; 
            border-radius: 6px; 
            font-size: 0.8rem; 
            font-weight: 600; 
        }
        .info-badge.mbti { 
            background: rgba(129, 140, 248, 0.1); 
            color: #818cf8; 
            border: 1px solid rgba(129, 140, 248, 0.2); 
        }

        .profile-card p { color: #9ca3af; font-size: 1.05rem; word-break: keep-all; }
        
        .repo-btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 0.6rem;
            margin-top: 1.5rem; 
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            color: #030712; 
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 0.85rem; 
            font-weight: 700; 
            text-decoration: none; 
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.25);
            transition: all 0.3s ease;
        }
        .repo-btn:hover { 
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.45);
        }

        .section-title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #4b5563; margin-bottom: 1.8rem; }
        
        /* 아코디언 스타일 */
        #logs-container details {
            background: rgba(17, 24, 39, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            margin-bottom: 1.2rem;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #logs-container details:hover {
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(17, 24, 39, 0.6);
        }
        #logs-container details[open] {
            border-color: rgba(56, 189, 248, 0.4);
            background: rgba(17, 24, 39, 0.8);
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.1);
        }
        
        #logs-container summary {
            padding: 1.4rem 1.8rem;
            color: #f3f4f6;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            list-style: none;
            position: relative;
            user-select: none;
        }
        #logs-container summary::-webkit-details-marker { display: none; }
        
        #logs-container summary::after {
            content: '+';
            position: absolute;
            right: 1.8rem;
            color: #6b7280;
            font-size: 1.4rem;
            font-weight: 300;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.3s ease, color 0.3s;
        }
        #logs-container details[open] summary::after {
            transform: translateY(-50%) rotate(45deg);
            color: #38bdf8;
        }

        .details-content {
            padding: 2rem;
            background: rgba(15, 23, 42, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #9ca3af;
            font-size: 0.95rem;
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .details-content ul { padding-left: 0.5rem; list-style: none; }
        .details-content li { margin-bottom: 0.9rem; position: relative; padding-left: 1.5rem; color: #9ca3af; }
        .details-content li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.65rem;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #38bdf8;
            box-shadow: 0 0 8px #38bdf8;
        }
        .details-content strong { color: #f3f4f6; font-weight: 600; margin-right: 0.5rem; }
        
        #logs-container h1 { font-size: 1.5rem; color: #fff; margin-bottom: 1.5rem; font-weight: 800; }
        #logs-container > p { color: #9ca3af; margin-bottom: 2rem; font-size: 1rem; }

        .loading { color: #4b5563; font-size: 0.9rem; text-align: center; padding: 4rem 0; font-family: monospace; }
        footer { text-align: center; margin-top: 8rem; padding: 2rem 0; border-top: 1px solid rgba(255, 255, 255, 0.03); color: #4b5563; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <main>
        <section class="profile-card">
            <div class="university">KONGJU NATIONAL UNIVERSITY</div>
            <h1>장운호</h1>
            
            <div class="badge-container">
                <span class="info-badge">지능형모빌리티공학과</span>
                <span class="info-badge mbti">MBTI: ISFJ</span>
            </div>
            
            <p>공주대학교 | RC카 기반 자율주행 프로그램 교육 과정</p>
            
            <a href="https://github.com/cloudcover0127/knu_rccar_2026" target="_blank" class="repo-btn">
                <span>🐱 GitHub Repository</span>
            </a>
        </section>

        <section>
            <div class="section-title">Daily Learning Logs</div>
            <div id="logs-container">
                <div class="loading">Parsing dynamic markdown logs...</div>
            </div>
        </section>
        
        <footer>
            <p>© 2026 Jang Un-ho. Designed with premium dark code.</p>
        </footer>
    </main>

    <script>
        const repoUrl = 'https://raw.githubusercontent.com/cloudcover0127/knu_rccar_2026/master/README.md';

        fetch(repoUrl)
            .then(response => {
                if (!response.ok) throw new Error();
                return response.text();
            })
            .then(text => {
                const rawHtml = marked.parse(text);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = rawHtml;
                
                const container = document.getElementById('logs-container');
                container.innerHTML = ''; 

                const dates = tempDiv.querySelectorAll('h3');
                
                if(dates.length === 0) {
                    container.innerHTML = `<div class="details-content">${rawHtml}</div>`;
                    return;
                }

                let currentEl = tempDiv.firstElementChild;
                while (currentEl && currentEl.tagName.toUpperCase() !== 'H3') {
                    container.appendChild(currentEl.cloneNode(true));
                    currentEl = currentEl.nextElementSibling;
                }

                dates.forEach(dateElement => {
                    const details = document.createElement('details');
                    const summary = document.createElement('summary');
                    
                    summary.textContent = dateElement.textContent; 
                    details.appendChild(summary);

                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'details-content';

                    let nextEl = dateElement.nextElementSibling;
                    while (nextEl && nextEl.tagName.toUpperCase() !== 'H3') {
                        contentDiv.appendChild(nextEl.cloneNode(true));
                        nextEl = nextEl.nextElementSibling;
                    }

                    details.appendChild(contentDiv);
                    container.appendChild(details);
                });
            })
            .catch(() => {
                document.getElementById('logs-container').innerHTML = 
                    `<p style="color: #ef4444; text-align:center; font-size:0.9rem;">README.md 연동에 실패했습니다.</p>`;
            });
    </script>

</body>
</html>
