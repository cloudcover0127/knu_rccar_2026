<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장운호 | 자율주행 포트폴리오</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: #0b0f19; /* 고급스러운 딥 다크 */
            color: #cbd5e1; 
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        main { max-width: 680px; margin: 0 auto; padding: 5rem 1.5rem; }

        /* ✨ 1. 프로필 영역 그라데이션 카드화 */
        .profile-card { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            padding: 2.5rem 2rem; 
            border-radius: 16px; 
            margin-bottom: 4rem;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }
        
        /* 은은한 배경 후광 효과 */
        .profile-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: #38bdf8;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }

        .university { 
            font-size: 0.8rem; 
            color: #38bdf8; 
            font-weight: 700; 
            letter-spacing: 1.5px; 
            margin-bottom: 0.6rem; 
        }
        .profile-card h1 { 
            font-size: 2.4rem; 
            font-weight: 800; 
            color: #fff; 
            margin-bottom: 0.8rem; 
            letter-spacing: -0.5px; 
        }
        .profile-card p { 
            color: #94a3b8; 
            font-size: 1.05rem; 
            font-weight: 400; 
            word-break: keep-all;
        }
        
        /* ✨ 2. 깃허브 바로가기 버튼 컴포넌트화 */
        .repo-btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 0.5rem;
            margin-top: 1.5rem; 
            background: #38bdf8;
            color: #0b0f19; 
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem; 
            font-weight: 700; 
            text-decoration: none; 
            transition: all 0.2s ease;
        }
        .repo-btn:hover { 
            background: #60a5fa; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
        }

        .section-title { 
            font-size: 0.8rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            color: #475569; 
            margin-bottom: 1.5rem; 
            padding-left: 0.2rem;
        }
        
        /* ✨ 3. 아코디언 카드 디자인 디테일 향상 */
        #logs-container details {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            margin-bottom: 1.2rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }
        #logs-container details[open] {
            border-color: #38bdf8;
            box-shadow: 0 10px 20px -3px rgba(56, 189, 248, 0.08);
        }
        
        #logs-container summary {
            padding: 1.3rem 1.5rem;
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            list-style: none;
            position: relative;
            user-select: none;
            transition: background 0.2s;
        }
        #logs-container summary::-webkit-details-marker { display: none; }
        
        /* 움직이는 세련된 화살표 */
        #logs-container summary::after {
            content: '→';
            position: absolute;
            right: 1.5rem;
            color: #475569;
            font-size: 1.1rem;
            transition: transform 0.3s ease, color 0.3s;
        }
        #logs-container details[open] summary::after {
            transform: rotate(90deg);
            color: #38bdf8;
        }
        #logs-container summary:hover { background-color: #1e293b; }

        /* 내부 본문 스타일링 */
        .details-content {
            padding: 1.8rem;
            background: #0f172a;
            border-top: 1px solid #1e293b;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        
        /* 리스트 항목에 트렌디한 인디케이터 적용 */
        .details-content ul { padding-left: 0.5rem; list-style: none; }
        .details-content li { margin-bottom: 0.8rem; position: relative; padding-left: 1.5rem; }
        .details-content li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.6rem;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #38bdf8;
        }
        .details-content strong { color: #e2e8f0; font-weight: 600; margin-right: 0.4rem; }
        
        .loading { color: #475569; font-size: 0.9rem; text-align: center; padding: 3rem 0; }
        
        footer { text-align: center; margin-top: 6rem; padding-top: 2rem; border-top: 1px solid #1e293b; color: #475569; font-size: 0.8rem; }
    </style>
</head>
<body>

    <main>
        <section class="profile-card">
            <div class="university">KONGJU NATIONAL UNIVERSITY</div>
            <h1>장운호</h1>
            <p>공주대학교 | RC카 기반 자율주행 프로그램 교육 과정</p>
            
            <a href="https://github.com/cloudcover0127/knu_rccar_2026" target="_blank" class="repo-btn">
                <span>🐱 GitHub Repository</span>
            </a>
        </section>

        <section>
            <div class="section-title">Daily Learning Logs</div>
            <div id="logs-container">
                <div class="loading">README 파일을 불러와 디자인을 적용 중...</div>
            </div>
        </section>
        
        <footer>
            <p>© 2026 Jang Un-ho. Powered by GitHub Pages.</p>
        </footer>
    </main>

    <script>
        const repoUrl = 'https://raw.githubusercontent.com/cloudcover0127/knu_rccar_2026/master/README.md';

        fetch(repoUrl)
            .then(response => {
                if (!response.ok) throw new Error();
                return response.text();
            })
            .then(text => {
                const rawHtml = marked.parse(text);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = rawHtml;
                
                const container = document.getElementById('logs-container');
                container.innerHTML = ''; 

                const dates = tempDiv.querySelectorAll('h3');
                
                if(dates.length === 0) {
                    container.innerHTML = `<div class="details-content">${rawHtml}</div>`;
                    return;
                }

                dates.forEach(dateElement => {
                    const details = document.createElement('details');
                    const summary = document.createElement('summary');
                    
                    summary.textContent = dateElement.textContent; 
                    details.appendChild(summary);

                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'details-content';

                    let nextEl = dateElement.nextElementSibling;
                    while (nextEl && nextEl.tagName !== 'H3') {
                        contentDiv.appendChild(nextEl.cloneNode(true));
                        nextEl = nextEl.nextElementSibling;
                    }

                    details.appendChild(contentDiv);
                    container.appendChild(details);
                });
            })
            .catch(() => {
                document.getElementById('logs-container').innerHTML = 
                    `<p style="color: #ef4444; text-align:center; font-size:0.9rem;">README.md 연동에 실패했습니다.</p>`;
            });
    </script>

</body>
</html>
