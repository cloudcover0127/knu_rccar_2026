<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장운호 | 자율주행 포트폴리오</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 깔끔한 다크 감성 스타일 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main { 
            flex: 1;
            max-width: 600px; 
            margin: 0 auto; 
            padding: 6rem 1.5rem 2rem 1.5rem; 
        }

        /* 내 프로필 상단 */
        .profile { margin-bottom: 3rem; }
        .university { font-size: 0.9rem; color: #38bdf8; font-weight: 700; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .profile h1 { font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 1rem; }
        .profile p { color: #94a3b8; font-size: 1.05rem; word-break: keep-all; }

        /* 프로젝트 단독 카드 */
        .section-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #475569; margin-bottom: 1rem; }
        
        .project-box { 
            background: #111827; 
            border: 1px solid #1f2937; 
            padding: 1.8rem; 
            border-radius: 12px; 
            margin-bottom: 2rem;
        }
        .project-box h3 { font-size: 1.15rem; color: #fff; font-family: monospace; margin-bottom: 0.6rem; }
        .project-box p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 1.5rem; }

        /* 버튼 스타일 */
        .btn { 
            display: inline-flex; 
            align-items: center; 
            background: #38bdf8; 
            color: #0b0f19; 
            font-weight: 700; 
            padding: 0.6rem 1.2rem; 
            border-radius: 6px; 
            font-size: 0.85rem; 
            text-decoration: none;
            transition: background 0.2s; 
        }
        .btn:hover { background: #0ea5e9; color: #fff; }

        footer { text-align: center; padding: 2rem 0; color: #334155; font-size: 0.8rem; }
    </style>
</head>
<body>

    <main>
        <section class="profile">
            <div class="university">KONGJU NATIONAL UNIVERSITY</div>
            <h1>장운호</h1>
            <p>공주대학교에 재학 중이며, 현재 RC카를 활용한 자율주행 프로그램 교육 과정을 이수하고 있습니다.</p>
        </section>

        <section>
            <div class="section-title">Current Project</div>
            <div class="project-box">
                <h3>knu_rccar_2026</h3>
                <p>파이썬 기초 문법부터 자율주행 알고리즘 구현까지, 교육 과정을 통해 배우고 개발한 코드를 기록해 나가는 저장소입니다.</p>
                
                <a href="https://github.com/cloudcover0127/knu_rccar_2026" target="_blank" class="btn">
                    GitHub Repository →
                </a>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Jang Un-ho. Powered by GitHub Pages.</p>
    </footer>

</body>
</html>
